<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Tideways — PNW Ferry Sim (Prototype v0.1)</title>
    <meta name="theme-color" content="#0e2533" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tideways" />
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <div class="stat" id="cash">
          <span class="label">Cash</span><span class="val" data-cash>$0</span>
        </div>
        <div class="stat">
          <span class="label" data-daylab>Day 1 · Mon</span><span class="val" data-clock>06:00</span>
        </div>
        <div class="stat">
          <span class="label">Net/day</span><span class="val" data-net>—</span>
        </div>
        <div class="spacer"></div>
        <div id="speed">
          <button id="speed-pause">⏸</button>
          <button id="speed-cycle">1×</button>
        </div>
      </div>

      <div id="main">
        <div id="map-wrap"><canvas id="cv"></canvas></div>

        <section id="view-schedule" class="tabview" hidden>
          <div class="panel-title">Timetable — drag a route onto a ferry's lane</div>
          <div id="timeline"></div>
        </section>

        <section id="view-company" class="tabview" hidden>
          <div id="company"></div>
          <div class="panel-title">Fleet</div>
          <div id="fleet"></div>
          <div id="buy-wrap"></div>
          <button id="new-game">⟳ Start a new company</button>
        </section>
      </div>

      <nav id="tabbar">
        <button data-tab="map" class="active"><i>🗺️</i><span>Map</span></button>
        <button data-tab="schedule"><i>🕑</i><span>Schedule</span></button>
        <button data-tab="company"><i>⚓</i><span>Company</span></button>
      </nav>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
