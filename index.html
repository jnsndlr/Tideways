<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Tideways — PNW Ferry Sim (Prototype v0.1)</title>
    <meta name="theme-color" content="#0e2533" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Tideways" />
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <div class="stat" id="cash">
          <span class="label">Cash</span><span class="val" data-cash>$100,000</span>
        </div>
        <div class="stat"><span class="label">Day</span><span class="val" data-day>1</span></div>
        <div class="stat">
          <span class="label">Time</span><span class="val" data-clock>06:00</span>
        </div>
        <div class="stat">
          <span class="label">Reputation</span><span class="val" data-rep>80</span>
        </div>
        <div class="stat">
          <span class="label">Value</span><span class="val" data-value>$150,000</span>
        </div>
        <div class="stat">
          <span class="label">Net/day</span><span class="val" data-net>$0</span>
        </div>
        <div class="spacer"></div>
        <div id="speed">
          <button data-speed="0">⏸</button>
          <button data-speed="1" class="active">1×</button>
          <button data-speed="2">2×</button>
          <button data-speed="4">4×</button>
        </div>
      </div>

      <div id="map-wrap"><canvas id="cv"></canvas></div>

      <div id="panel">
        <div class="panel-title">Timetable — drag a route onto a ferry's lane</div>
        <div id="timeline"></div>
        <div class="panel-title">Routes &amp; demand</div>
        <div id="routes"></div>
        <div class="panel-title">Fleet</div>
        <div id="fleet"></div>
        <div id="buy-wrap"></div>
        <button id="new-game">⟳ Start a new company</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
