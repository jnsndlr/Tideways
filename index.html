<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>PNW Ferry — Prototype v0.1</title>
<style>
  :root {
    --water: #15445f;
    --water2: #1d5a7a;
    --land: #3f6b4a;
    --land2: #4f8059;
    --hull: #1f6f54;
    --deck: #f4f1e8;
    --ink: #0c2230;
    --panel: #0e2533;
    --panel2: #143348;
    --line: #2a5973;
    --txt: #e8f1f6;
    --txt-dim: #9fbccc;
    --gold: #f3c14b;
    --good: #5bd49a;
    --bad: #f0795f;
    --accent: #57b6e0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #08151f; color: var(--txt);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overflow: hidden; user-select: none;
  }
  #app {
    max-width: 480px; margin: 0 auto; height: 100%;
    display: flex; flex-direction: column;
    background: #08151f;
  }

  /* ---- Top HUD ---- */
  #hud {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 10px; background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .stat { display: flex; flex-direction: column; line-height: 1.1; }
  .stat .label { font-size: 9px; color: var(--txt-dim); text-transform: uppercase; letter-spacing: .5px; }
  .stat .val { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; }
  #cash .val { color: var(--gold); }
  .spacer { flex: 1; }
  #speed { display: flex; gap: 4px; }
  #speed button {
    width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--panel2); color: var(--txt); font-size: 12px; font-weight: 700;
  }
  #speed button.active { background: var(--accent); color: #05222e; border-color: var(--accent); }

  /* ---- Map ---- */
  #map-wrap { position: relative; flex: 1; min-height: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  /* ---- Control panel ---- */
  #panel {
    background: var(--panel); border-top: 1px solid var(--line);
    padding: 8px 10px 12px; max-height: 46%; overflow-y: auto;
  }
  .panel-title { font-size: 10px; color: var(--txt-dim); text-transform: uppercase; letter-spacing: .6px; margin: 4px 2px; }

  .route-card {
    background: var(--panel2); border: 1px solid var(--line); border-radius: 10px;
    padding: 8px 10px; margin-bottom: 8px;
  }
  .route-head { display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .route-name { font-weight: 700; font-size: 13px; flex: 1; }
  .route-sub { font-size: 10px; color: var(--txt-dim); }
  .route-stats { display: flex; gap: 12px; margin-top: 6px; font-size: 11px; }
  .route-stats b { color: var(--txt); font-variant-numeric: tabular-nums; }
  .route-stats span { color: var(--txt-dim); }

  .boat-row { display: flex; align-items: center; gap: 8px; padding: 6px 2px; }
  .boat-tag { font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .seg { display: flex; gap: 4px; flex: 1; }
  .seg button {
    flex: 1; padding: 7px 4px; border-radius: 8px; border: 1px solid var(--line);
    background: #0e2839; color: var(--txt-dim); font-size: 11px; font-weight: 600;
  }
  .seg button.on { color: #05222e; font-weight: 800; }

  #buy {
    width: 100%; padding: 11px; border-radius: 10px; border: 1px dashed var(--line);
    background: transparent; color: var(--gold); font-size: 13px; font-weight: 700; margin-top: 2px;
  }
  #buy:disabled { color: var(--txt-dim); opacity: .5; }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="stat" id="cash"><span class="label">Cash</span><span class="val" data-cash>$100,000</span></div>
    <div class="stat"><span class="label">Day</span><span class="val" data-day>1</span></div>
    <div class="stat"><span class="label">Time</span><span class="val" data-clock>06:00</span></div>
    <div class="stat"><span class="label">Reputation</span><span class="val" data-rep>80</span></div>
    <div class="spacer"></div>
    <div id="speed">
      <button data-speed="0">⏸</button>
      <button data-speed="1" class="active">1×</button>
      <button data-speed="2">2×</button>
      <button data-speed="4">4×</button>
    </div>
  </div>

  <div id="map-wrap"><canvas id="cv"></canvas></div>

  <div id="panel">
    <div class="panel-title">Routes</div>
    <div id="routes"></div>
    <div class="panel-title">Fleet — assign each boat to a route</div>
    <div id="fleet"></div>
    <button id="buy">+ Buy ferry — $80,000</button>
  </div>
</div>

<script>
"use strict";

/* =========================================================================
   CONFIG  — all tunable model numbers live here (model-first balancing)
   ========================================================================= */
const CONFIG = {
  startCash: 100000,
  boatCost: 80000,

  // Time: in-game minutes that pass per real second at 1× speed.
  gameMinPerSec: 6,            // full 24h day ≈ 4 real min; operating window ≈ 3 min
  operatingStart: 6 * 60,      // 06:00
  operatingEnd:   22 * 60,     // 22:00

  // Vessel (single class for now)
  ferry: {
    peopleCap: 500,            // total people incl. those riding in cars
    carCap: 64,                // car-deck slots
    avgOccupancy: 2.0,         // avg people per car (1–4 in reality)
    loadMinutes: 10,           // dwell at each terminal
  },

  // Fares
  fare: { foot: 14, car: 30 }, // car fare flat for now (driver incl.)

  // Fuel
  fuelCostPerNm: 22,           // $ per nautical mile, charged per crossing

  // Demand / behaviour
  patienceMin: 120,            // forgiving: people wait up to 2h before balking
  balkRatePerMin: 0.004,       // slow trickle once over patience

  // Reputation (slow + forgiving)
  repStart: 80,
  repServedGain: 0.00010,      // per person served well
  repBalkLoss: 0.0020,         // per person balked
  repDriftToNeutral: 0.02,     // per in-game day, drifts toward 70

  // Routes: hub is shared (Anacortes). distance in nm, crossing in game-min.
  routes: [
    {
      id: "lopez", name: "Lopez Island", color: "#5bd49a",
      distanceNm: 8, crossingMin: 25,
      dailyFoot: 1200, dailyCars: 280,     // potential trips/day (both directions)
      pos: { x: 0.20, y: 0.20 },
    },
    {
      id: "friday", name: "Friday Harbor", color: "#f3c14b",
      distanceNm: 16, crossingMin: 48,
      dailyFoot: 2200, dailyCars: 520,
      pos: { x: 0.82, y: 0.24 },
    },
  ],
  hub: { name: "Anacortes", pos: { x: 0.5, y: 0.86 } },
};

/* =========================================================================
   STATE
   ========================================================================= */
const S = {
  cash: CONFIG.startCash,
  day: 1,
  clock: CONFIG.operatingStart,   // in-game minutes 0..1440
  rep: CONFIG.repStart,
  speed: 1,
  routes: {},   // id -> { ...def, qOut, qIn (queues), servedToday, balkedToday }
  boats: [],
};

// queue object: amount(foot, car) + waitTimer (min since last meaningful service)
function newQueue() {
  return { foot: 0, car: 0, footWait: 0, carWait: 0 };
}

CONFIG.routes.forEach(r => {
  S.routes[r.id] = {
    def: r,
    out: newQueue(),   // hub -> destination
    in:  newQueue(),   // destination -> hub
    servedToday: 0,
    balkedToday: 0,
  };
});

let boatCounter = 0;
function addBoat(routeId) {
  boatCounter++;
  S.boats.push({
    id: boatCounter,
    name: "Ferry " + boatCounter,
    routeId,                 // assigned route (or null = idle at hub)
    pendingRoute: routeId,   // takes effect next time at hub
    phase: "hub",            // hub | out | dest | back
    p: 0,                    // 0..1 along the crossing
    timer: 0,                // minutes remaining for loading
    pax: { foot: 0, car: 0, dir: "out" }, // cargo currently aboard
  });
}
addBoat("lopez");

/* =========================================================================
   DEMAND  — daily curve with morning + evening peaks
   ========================================================================= */
function dayCurve(min) {
  // returns a weight; integrates (roughly) to 1 over the operating window
  if (min < CONFIG.operatingStart || min > CONFIG.operatingEnd) return 0;
  const peak = (c, w, h) => h * Math.exp(-Math.pow(min - c, 2) / (2 * w * w));
  const base = 0.20;
  const v = base
    + peak(8 * 60, 60, 2.4)    // morning commute
    + peak(17 * 60, 80, 2.0)   // evening commute
    + peak(13 * 60, 120, 0.7); // midday tourist bump
  return v;
}
// Precompute normalization so dailyFoot is actually delivered across the day.
let curveArea = 0;
for (let m = CONFIG.operatingStart; m <= CONFIG.operatingEnd; m++) curveArea += dayCurve(m);

function accrueDemand(dtMin) {
  const w = dayCurve(S.clock) / curveArea; // fraction of daily total per minute
  for (const id in S.routes) {
    const R = S.routes[id];
    const foot = R.def.dailyFoot * w * dtMin;
    const car  = R.def.dailyCars * w * dtMin;
    // split evenly between the two directions
    R.out.foot += foot / 2; R.in.foot += foot / 2;
    R.out.car  += car  / 2; R.in.car  += car  / 2;
  }
}

/* =========================================================================
   BALKING + REPUTATION
   ========================================================================= */
function updateQueue(q, R, dtMin) {
  // wait timers grow while people sit
  if (q.foot > 0.5) q.footWait += dtMin; else q.footWait = 0;
  if (q.car  > 0.5) q.carWait  += dtMin; else q.carWait  = 0;

  if (q.footWait > CONFIG.patienceMin && q.foot > 0) {
    const b = Math.min(q.foot, q.foot * CONFIG.balkRatePerMin * dtMin);
    q.foot -= b; R.balkedToday += b; S.rep -= b * CONFIG.repBalkLoss;
  }
  if (q.carWait > CONFIG.patienceMin && q.car > 0) {
    const b = Math.min(q.car, q.car * CONFIG.balkRatePerMin * dtMin);
    q.car -= b; R.balkedToday += b * CONFIG.ferry.avgOccupancy;
    S.rep -= b * CONFIG.ferry.avgOccupancy * CONFIG.repBalkLoss;
  }
}

/* =========================================================================
   BOAT LOADING  — enforces deck rule: cars<=64, people(foot+in-car)<=500
   ========================================================================= */
function loadBoat(boat, q, R) {
  const F = CONFIG.ferry;
  const carsAvail = Math.floor(q.car);
  const carsLoaded = Math.min(carsAvail, F.carCap);
  const peopleFromCars = carsLoaded * F.avgOccupancy;
  const footRoom = Math.max(0, F.peopleCap - peopleFromCars);
  const footLoaded = Math.min(Math.floor(q.foot), footRoom);

  q.car  -= carsLoaded;
  q.foot -= footLoaded;
  if (q.car  < 0.5) q.carWait = 0;
  if (q.foot < 0.5) q.footWait = 0;

  boat.pax.foot = footLoaded;
  boat.pax.car  = carsLoaded;

  const revenue = carsLoaded * CONFIG.fare.car + footLoaded * CONFIG.fare.foot;
  S.cash += revenue;

  const served = footLoaded + peopleFromCars;
  R.servedToday += served;
  S.rep += served * CONFIG.repServedGain;
}

function chargeFuel(R) {
  S.cash -= R.def.distanceNm * CONFIG.fuelCostPerNm;
}

/* =========================================================================
   SIM STEP
   ========================================================================= */
function step(dtMin) {
  // advance clock / day rollover
  S.clock += dtMin;
  if (S.clock >= 1440) {
    S.clock -= 1440; S.day++;
    for (const id in S.routes) { S.routes[id].servedToday = 0; S.routes[id].balkedToday = 0; }
    S.rep += (70 - S.rep) * CONFIG.repDriftToNeutral; // gentle drift toward neutral
  }

  accrueDemand(dtMin);
  for (const id in S.routes) {
    updateQueue(S.routes[id].out, S.routes[id], dtMin);
    updateQueue(S.routes[id].in,  S.routes[id], dtMin);
  }

  for (const boat of S.boats) stepBoat(boat, dtMin);

  S.rep = Math.max(0, Math.min(100, S.rep));
}

function stepBoat(boat, dtMin) {
  const open = S.clock >= CONFIG.operatingStart && S.clock < CONFIG.operatingEnd;

  switch (boat.phase) {
    case "hub": {
      // adopt any pending reassignment while docked at the shared hub
      boat.routeId = boat.pendingRoute;
      if (!boat.routeId || !open) { boat.timer = 0; return; }
      const R = S.routes[boat.routeId];
      boat.timer += dtMin;
      if (boat.timer >= CONFIG.ferry.loadMinutes) {
        loadBoat(boat, R.out, R);   // load hub->dest passengers
        chargeFuel(R);
        boat.phase = "out"; boat.p = 0; boat.timer = 0; boat.pax.dir = "out";
      }
      break;
    }
    case "out": {
      const R = S.routes[boat.routeId];
      boat.p += dtMin / R.def.crossingMin;
      if (boat.p >= 1) { boat.p = 1; boat.phase = "dest"; boat.timer = 0; boat.pax = { foot:0, car:0, dir:"in" }; }
      break;
    }
    case "dest": {
      const R = S.routes[boat.routeId];
      boat.timer += dtMin;
      if (boat.timer >= CONFIG.ferry.loadMinutes) {
        loadBoat(boat, R.in, R);    // load dest->hub passengers
        chargeFuel(R);
        boat.phase = "back"; boat.p = 1; boat.timer = 0; boat.pax.dir = "in";
      }
      break;
    }
    case "back": {
      const R = S.routes[boat.routeId];
      boat.p -= dtMin / R.def.crossingMin;
      if (boat.p <= 0) { boat.p = 0; boat.phase = "hub"; boat.timer = 0; boat.pax = { foot:0, car:0, dir:"out" }; }
      break;
    }
  }
}

/* =========================================================================
   RENDER
   ========================================================================= */
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
let W = 0, H = 0, DPR = 1;

function resize() {
  const wrap = document.getElementById("map-wrap");
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = wrap.clientWidth; H = wrap.clientHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener("resize", resize);

function px(pt) { return { x: pt.x * W, y: pt.y * H }; }

function drawWater() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, "#1d5a7a"); g.addColorStop(1, "#10374e");
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // subtle moving wave streaks
  ctx.strokeStyle = "rgba(255,255,255,0.04)"; ctx.lineWidth = 2;
  const t = performance.now() / 1000;
  for (let i = 0; i < 7; i++) {
    const y = (i + 1) / 8 * H + Math.sin(t + i) * 3;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 20) ctx.lineTo(x, y + Math.sin((x / 60) + t + i) * 3);
    ctx.stroke();
  }
}

function drawTerminal(pt, label, color, big) {
  const r = big ? 16 : 13;
  // land blob
  ctx.fillStyle = "#43734f";
  ctx.beginPath(); ctx.ellipse(pt.x, pt.y, r + 18, r + 13, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = "#4f8059";
  ctx.beginPath(); ctx.ellipse(pt.x, pt.y, r + 10, r + 7, 0, 0, Math.PI * 2); ctx.fill();
  // dock pad
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(pt.x, pt.y, r * 0.45, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,.35)"; ctx.lineWidth = 2; ctx.stroke();
  // label
  ctx.fillStyle = "#eaf3f8"; ctx.font = "700 12px -apple-system, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(label, pt.x, pt.y + r + 28);
}

function drawRouteLine(a, b, color) {
  ctx.strokeStyle = color + "55"; ctx.lineWidth = 3; ctx.setLineDash([6, 7]);
  ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
  ctx.setLineDash([]);
}

// draw a stack of pips representing a queue near a point, offset direction
function drawQueue(pt, off, foot, car, color) {
  const total = Math.round(foot) + Math.round(car);
  if (total <= 0) return;
  const cols = 8, size = 4, gap = 5;
  let n = Math.min(Math.ceil(total / 12), 40); // 1 pip ~ 12 people
  const cars = Math.min(Math.ceil(car / 8), 12);
  const ox = pt.x + off.x, oy = pt.y + off.y;
  for (let i = 0; i < n; i++) {
    const cx = ox + (i % cols) * gap;
    const cy = oy + Math.floor(i / cols) * gap;
    ctx.fillStyle = i < cars ? "#e7b04a" : color;
    ctx.fillRect(cx, cy, size, size);
  }
  ctx.fillStyle = "#eaf3f8"; ctx.font = "700 10px sans-serif"; ctx.textAlign = "left";
  ctx.fillText(total + (total > 0 ? "" : ""), ox, oy - 4);
}

function drawBoat(boat) {
  if (!boat.routeId) return;
  const R = S.routes[boat.routeId];
  const hub = px(CONFIG.hub.pos);
  const dest = px(R.def.pos);
  let pos, ang;
  if (boat.phase === "hub") { pos = hub; ang = Math.atan2(dest.y - hub.y, dest.x - hub.x); }
  else if (boat.phase === "dest") { pos = dest; ang = Math.atan2(hub.y - dest.y, hub.x - dest.x); }
  else {
    const p = boat.p;
    pos = { x: hub.x + (dest.x - hub.x) * p, y: hub.y + (dest.y - hub.y) * p };
    const dir = boat.phase === "out" ? 1 : -1;
    ang = Math.atan2((dest.y - hub.y) * dir, (dest.x - hub.x) * dir);
  }
  ctx.save();
  ctx.translate(pos.x, pos.y); ctx.rotate(ang);
  // wake
  ctx.fillStyle = "rgba(255,255,255,.10)";
  ctx.beginPath(); ctx.moveTo(-10, -7); ctx.lineTo(-26, 0); ctx.lineTo(-10, 7); ctx.fill();
  // hull
  ctx.fillStyle = "#1f6f54";
  ctx.beginPath();
  ctx.moveTo(14, 0); ctx.lineTo(6, -7); ctx.lineTo(-12, -7);
  ctx.lineTo(-12, 7); ctx.lineTo(6, 7); ctx.closePath(); ctx.fill();
  // deck house
  ctx.fillStyle = "#f4f1e8";
  ctx.fillRect(-8, -5, 12, 10);
  ctx.fillStyle = R.def.color;
  ctx.fillRect(-8, -5, 3, 10);
  ctx.restore();

  // load fill indicator above boat
  const load = (boat.pax.foot + boat.pax.car * CONFIG.ferry.avgOccupancy) / CONFIG.ferry.peopleCap;
  if (load > 0.001) {
    ctx.fillStyle = "rgba(0,0,0,.4)"; ctx.fillRect(pos.x - 14, pos.y - 18, 28, 4);
    ctx.fillStyle = load > 0.95 ? "#f0795f" : "#5bd49a";
    ctx.fillRect(pos.x - 14, pos.y - 18, 28 * Math.min(1, load), 4);
  }
}

function render() {
  drawWater();
  const hub = px(CONFIG.hub.pos);
  for (const id in S.routes) drawRouteLine(hub, px(S.routes[id].def.pos), S.routes[id].def.color);

  // queues at hub (outbound, per route) and at each dest (inbound)
  let qi = 0;
  for (const id in S.routes) {
    const R = S.routes[id];
    drawQueue(hub, { x: -50 + qi * 44, y: -56 }, R.out.foot, R.out.car, R.def.color);
    drawQueue(px(R.def.pos), { x: -16, y: 22 }, R.in.foot, R.in.car, R.def.color);
    qi++;
  }

  for (const id in S.routes) drawTerminal(px(S.routes[id].def.pos), S.routes[id].def.name, S.routes[id].def.color, false);
  drawTerminal(hub, CONFIG.hub.name, "#57b6e0", true);

  for (const boat of S.boats) drawBoat(boat);
}

/* =========================================================================
   UI PANEL
   ========================================================================= */
function fmt(n) { return "$" + Math.round(n).toLocaleString(); }
function clockStr(m) {
  const h = Math.floor(m / 60), mm = Math.floor(m % 60);
  return String(h).padStart(2, "0") + ":" + String(mm).padStart(2, "0");
}

function buildRoutes() {
  const el = document.getElementById("routes"); el.innerHTML = "";
  for (const id in S.routes) {
    const R = S.routes[id];
    const carPax = Math.round(R.def.dailyCars * CONFIG.ferry.avgOccupancy);
    const estDaily = R.def.dailyFoot + carPax;
    const card = document.createElement("div"); card.className = "route-card";
    card.innerHTML = `
      <div class="route-head">
        <div class="dot" style="background:${R.def.color}"></div>
        <div class="route-name">${R.def.name}</div>
        <div class="route-sub">${R.def.distanceNm} nm · ${R.def.crossingMin} min</div>
      </div>
      <div class="route-stats">
        <div><span>Est. daily demand</span> <b data-est="${id}">${estDaily.toLocaleString()}</b></div>
        <div><span>Waiting</span> <b data-wait="${id}">0</b></div>
        <div><span>Served</span> <b data-served="${id}">0</b></div>
        <div><span>Balked</span> <b data-balk="${id}">0</b></div>
      </div>`;
    el.appendChild(card);
  }
}

function buildFleet() {
  const el = document.getElementById("fleet"); el.innerHTML = "";
  for (const boat of S.boats) {
    const row = document.createElement("div"); row.className = "boat-row";
    const tag = document.createElement("div"); tag.className = "boat-tag";
    tag.textContent = "⛴ " + boat.name;
    const seg = document.createElement("div"); seg.className = "seg";
    for (const id in S.routes) {
      const b = document.createElement("button");
      b.textContent = S.routes[id].def.name;
      const on = boat.pendingRoute === id;
      if (on) { b.classList.add("on"); b.style.background = S.routes[id].def.color; }
      b.onclick = () => { boat.pendingRoute = id; buildFleet(); };
      seg.appendChild(b);
    }
    const idle = document.createElement("button");
    idle.textContent = "Idle";
    if (!boat.pendingRoute) { idle.classList.add("on"); idle.style.background = "#7d93a0"; }
    idle.onclick = () => { boat.pendingRoute = null; buildFleet(); };
    seg.appendChild(idle);
    row.appendChild(tag); row.appendChild(seg);
    el.appendChild(row);
  }
  const buy = document.getElementById("buy");
  buy.textContent = "+ Buy ferry — " + fmt(CONFIG.boatCost);
  buy.disabled = S.cash < CONFIG.boatCost;
}

document.getElementById("buy").onclick = () => {
  if (S.cash < CONFIG.boatCost) return;
  S.cash -= CONFIG.boatCost;
  addBoat(CONFIG.routes[0].id);
  buildFleet();
};

document.querySelectorAll("#speed button").forEach(b => {
  b.onclick = () => {
    S.speed = parseInt(b.dataset.speed, 10);
    document.querySelectorAll("#speed button").forEach(x => x.classList.remove("active"));
    b.classList.add("active");
  };
});

function updateHud() {
  document.querySelector("[data-cash]").textContent = fmt(S.cash);
  document.querySelector("[data-day]").textContent = S.day;
  document.querySelector("[data-clock]").textContent = clockStr(S.clock);
  document.querySelector("[data-rep]").textContent = Math.round(S.rep);
  for (const id in S.routes) {
    const R = S.routes[id];
    const waiting = Math.round(R.out.foot + R.out.car * CONFIG.ferry.avgOccupancy + R.in.foot + R.in.car * CONFIG.ferry.avgOccupancy);
    document.querySelector(`[data-wait="${id}"]`).textContent = waiting.toLocaleString();
    document.querySelector(`[data-served="${id}"]`).textContent = Math.round(R.servedToday).toLocaleString();
    document.querySelector(`[data-balk="${id}"]`).textContent = Math.round(R.balkedToday).toLocaleString();
  }
}

/* =========================================================================
   MAIN LOOP
   ========================================================================= */
let last = performance.now();
function loop(now) {
  const dtReal = Math.min((now - last) / 1000, 0.1); // clamp big gaps
  last = now;
  const dtMin = dtReal * CONFIG.gameMinPerSec * S.speed;
  if (dtMin > 0) {
    // sub-step for stability at high speed
    const steps = Math.max(1, Math.ceil(dtMin / 5));
    for (let i = 0; i < steps; i++) step(dtMin / steps);
  }
  render();
  updateHud();
  requestAnimationFrame(loop);
}

resize();
buildRoutes();
buildFleet();
requestAnimationFrame(loop);
</script>
</body>
</html>
